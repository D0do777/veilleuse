<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LED Control</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
padding:20px;
}

h1{
margin-bottom:20px;
}

.connectBtn{
margin-bottom:25px;
padding:12px 20px;
font-size:16px;
border:none;
border-radius:10px;
background:#333;
color:white;
}

.switch{
position:relative;
display:inline-block;
width:70px;
height:36px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#555;
border-radius:40px;
transition:.3s;
}

.slider:before{
position:absolute;
content:"";
height:28px;
width:28px;
left:4px;
bottom:4px;
background:white;
border-radius:50%;
transition:.3s;
}

input:checked + .slider{
background:#34c759;
}

input:checked + .slider:before{
transform:translateX(34px);
}

#colors{
margin-top:35px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
opacity:.3;
pointer-events:none;
}

#colors.active{
opacity:1;
pointer-events:auto;
}

.colorBtn{
height:60px;
border:none;
border-radius:12px;
}

.red{background:#ff3b30;}
.green{background:#34c759;}
.blue{background:#007aff;}
.yellow{background:#ffd60a;}
.purple{background:#af52de;}
.white{background:white;}

.multi{
background:linear-gradient(45deg,red,orange,yellow,green,blue,purple);
}

.rainbow{
background:linear-gradient(270deg,red,orange,yellow,green,blue,purple);
background-size:600% 600%;
animation:rainbowMove 4s linear infinite;
}

@keyframes rainbowMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.brightnessBox{
margin-top:35px;
opacity:.3;
pointer-events:none;
}

.brightnessBox.active{
opacity:1;
pointer-events:auto;
}

input[type=range]{
width:90%;
margin-top:10px;
}

</style>
</head>

<body>

<h1>LED Control</h1>

<button class="connectBtn" onclick="connect()">Connect Microbit</button>

<br>

<label class="switch">
<input type="checkbox" id="toggle">
<span class="slider"></span>
</label>

<div id="colors">

<button class="colorBtn red" onclick="sendColor(1)"></button>
<button class="colorBtn green" onclick="sendColor(2)"></button>
<button class="colorBtn blue" onclick="sendColor(3)"></button>

<button class="colorBtn yellow" onclick="sendColor(4)"></button>
<button class="colorBtn purple" onclick="sendColor(5)"></button>
<button class="colorBtn white" onclick="sendColor(6)"></button>

<button class="colorBtn multi" onclick="sendColor(7)"></button>
<button class="colorBtn rainbow" onclick="sendColor(8)"></button>

</div>

<div class="brightnessBox" id="brightnessBox">

<p>Brightness</p>

<input type="range" min="0" max="100" value="80" id="brightnessSlider">

</div>

<script>

let device;
let characteristic;

const toggle=document.getElementById("toggle")
const colors=document.getElementById("colors")
const brightnessBox=document.getElementById("brightnessBox")

toggle.addEventListener("change",()=>{

if(toggle.checked){
colors.classList.add("active")
brightnessBox.classList.add("active")
}else{
colors.classList.remove("active")
brightnessBox.classList.remove("active")
}

})

async function connect(){

try{

device=await navigator.bluetooth.requestDevice({
filters:[{namePrefix:"BBC micro:bit"}],
optionalServices:["e95d0753-251d-470a-a062-fa1922dfa9a8"]
})

const server=await device.gatt.connect()

const service=await server.getPrimaryService("e95d0753-251d-470a-a062-fa1922dfa9a8")

characteristic=await service.getCharacteristic("e95d5404-251d-470a-a062-fa1922dfa9a8")

alert("Microbit connecté")

}catch(error){
console.log(error)
}

}

function sendColor(value){

if(!toggle.checked) return

if(characteristic){

const data=new Uint8Array([value])

characteristic.writeValue(data)

}

}

const slider=document.getElementById("brightnessSlider")

slider.addEventListener("input",()=>{

let brightnessValue=slider.value

if(characteristic){

const data=new Uint8Array([20,brightnessValue])

characteristic.writeValue(data)

}

})

</script>

</body>
</html>
