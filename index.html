<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LED Control</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
padding:20px;
}

/* TITRE */

h1{
margin-bottom:20px;
}

/* BOUTON CONNECTION */

.connectBtn{
margin-bottom:20px;
padding:12px 20px;
font-size:16px;
border:none;
border-radius:10px;
background:#333;
color:white;
}

/* SWITCH */

.switch{
position:relative;
display:inline-block;
width:70px;
height:36px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#555;
border-radius:40px;
transition:.3s;
}

.slider:before{
position:absolute;
content:"";
height:28px;
width:28px;
left:4px;
bottom:4px;
background:white;
border-radius:50%;
transition:.3s;
}

input:checked + .slider{
background:#34c759;
}

input:checked + .slider:before{
transform:translateX(34px);
}

/* PAGE ACCUEIL */

#homePage{
display:block;
}

#colors{
margin-top:35px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
opacity:.3;
pointer-events:none;
}

#colors.active{
opacity:1;
pointer-events:auto;
}

.colorBtn{
height:60px;
border:none;
border-radius:12px;
}

.red{background:#ff3b30;}
.green{background:#34c759;}
.blue{background:#007aff;}
.yellow{background:#ffd60a;}
.purple{background:#af52de;}
.white{background:white;}

.multi{
background:linear-gradient(45deg,red,orange,yellow,green,blue,purple);
}

.rainbow{
background:linear-gradient(270deg,red,orange,yellow,green,blue,purple);
background-size:600% 600%;
animation:rainbowMove 4s linear infinite;
}

@keyframes rainbowMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* PAGE COULEUR */

#colorPage{
display:none;
}

#preview{
width:100%;
height:50vh;
border-radius:20px;
margin-top:20px;
}

#brightnessSlider{
width:90%;
margin-top:20px;
}

.backBtn{
margin-top:25px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#444;
color:white;
font-size:16px;
}

</style>
</head>

<body>

<!-- PAGE PRINCIPALE -->

<div id="homePage">

<h1>LED Control</h1>

<button class="connectBtn" onclick="connect()">Connect Microbit</button>

<br>

<label class="switch">
<input type="checkbox" id="toggle">
<span class="slider"></span>
</label>

<div id="colors">

<button class="colorBtn red" onclick="openColor('#ff3b30',1)"></button>
<button class="colorBtn green" onclick="openColor('#34c759',2)"></button>
<button class="colorBtn blue" onclick="openColor('#007aff',3)"></button>

<button class="colorBtn yellow" onclick="openColor('#ffd60a',4)"></button>
<button class="colorBtn purple" onclick="openColor('#af52de',5)"></button>
<button class="colorBtn white" onclick="openColor('#ffffff',6)"></button>

<button class="colorBtn multi" onclick="openColor('multi',7)"></button>
<button class="colorBtn rainbow" onclick="openColor('rainbow',8)"></button>

</div>

</div>

<!-- PAGE COULEUR -->

<div id="colorPage">

<div id="preview"></div>

<input type="range" min="10" max="100" value="100" id="brightnessSlider">

<br>

<button class="backBtn" onclick="goBack()">Retour</button>

</div>

<script>

let device;
let characteristic;

const toggle=document.getElementById("toggle")
const colors=document.getElementById("colors")

toggle.addEventListener("change",()=>{

if(toggle.checked){
colors.classList.add("active")
}else{
colors.classList.remove("active")
}

})

/* BLUETOOTH */

async function connect(){

try{

device=await navigator.bluetooth.requestDevice({
filters:[{namePrefix:"BBC micro:bit"}],
optionalServices:["e95d0753-251d-470a-a062-fa1922dfa9a8"]
})

const server=await device.gatt.connect()

const service=await server.getPrimaryService("e95d0753-251d-470a-a062-fa1922dfa9a8")

characteristic=await service.getCharacteristic("e95d5404-251d-470a-a062-fa1922dfa9a8")

alert("Microbit connecté")

}catch(error){
console.log(error)
}

}

/* NAVIGATION INTERNE */

function openColor(color,value){

if(!toggle.checked) return

document.getElementById("homePage").style.display="none"
document.getElementById("colorPage").style.display="block"

const preview=document.getElementById("preview")

preview.style.animation="none"

if(color==="multi"){
preview.style.background="linear-gradient(45deg,red,orange,yellow,green,blue,purple)"
}

else if(color==="rainbow"){
preview.style.background="linear-gradient(270deg,red,orange,yellow,green,blue,purple)"
preview.style.backgroundSize="600% 600%"
preview.style.animation="rainbowMove 4s linear infinite"
}

else{
preview.style.background=color
}

sendColor(value)

}

/* RETOUR */

function goBack(){

document.getElementById("homePage").style.display="block"
document.getElementById("colorPage").style.display="none"

}

/* ENVOI COULEUR */

function sendColor(value){

if(characteristic){

const data=new Uint8Array([value])
characteristic.writeValue(data)

}

}

/* LUMINOSITÉ */

const slider=document.getElementById("brightnessSlider")

slider.addEventListener("input",()=>{

let brightness=slider.value/100

document.getElementById("preview").style.filter="brightness("+brightness+")"

if(characteristic){

const data=new Uint8Array([20,slider.value])
characteristic.writeValue(data)

}

})

</script>

</body>
</html>
